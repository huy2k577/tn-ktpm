<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STU - Hệ Thống Luyện Thi Công Nghệ Phần Mềm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #dbeafe;
            --success: #10b981;
            --success-light: #ecfdf5;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --warning: #eab308;
            --warning-light: #fef08a;
            --warning-text: #854d0e;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --border: #e5e7eb;
            --radius: 12px;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            
            font-size: 15px; 
        }

        @media (min-width: 901px) {
            :root {
                font-size: 22px;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            position: sticky;
            top: 0;
            z-index: 90;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header-nav-link {
            display: inline-block;
            margin-top: 8px;
            padding: 0.4rem 1.1rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 999px;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
        }

        .header-nav-link:hover {
            background: rgba(255,255,255,0.28);
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1400px;
            margin: 1.5rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 1.5rem;
        }

        @media (max-width: 900px) {
            .container { 
                grid-template-columns: 1fr; 
                margin: 0.8rem auto;
                gap: 1.5rem;
            }
            .sidebar { 
                position: static !important;
                margin-top: 0.5rem;
            }
            header h1 {
                font-size: 1.4rem;
            }
        }

        .main-content {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.8rem;
            box-shadow: var(--shadow);
            min-height: 350px;
        }

        .sidebar {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.2rem;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 120px;
        }

        .progress-container {
            margin-bottom: 1rem;
        }

        .progress-bar-bg {
            background: var(--border);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 6px;
        }

        .progress-bar-fill {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .grid-nav {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .grid-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .grid-item.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .grid-item.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .grid-item.wrong {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .grid-item.skipped {
            background: var(--warning);
            color: var(--warning-text);
            border-color: var(--warning);
        }

        .q-header {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            white-space: pre-line;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 0.9rem 1.2rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 500;
            font-size: 0.95rem;
            -webkit-tap-highlight-color: transparent;
        }

        .option-item:not(.disabled):hover {
            background-color: var(--bg-body);
            border-color: var(--text-muted);
        }

        .option-item.correct-instant {
            border-color: var(--success) !important;
            background-color: var(--success-light) !important;
            color: #065f46 !important;
        }

        .option-item.wrong-instant {
            border-color: var(--danger) !important;
            background-color: var(--danger-light) !important;
            color: #991b1b !important;
        }

        .option-item.disabled {
            cursor: not-allowed;
        }

        .option-prefix {
            font-weight: 700;
            margin-right: 12px;
            background: var(--bg-body);
            width: 32px;
            height: 32px;
            min-width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.85rem;
        }

        .option-item.correct-instant .option-prefix {
            background: var(--success);
            color: white;
        }

        .option-item.wrong-instant .option-prefix {
            background: var(--danger);
            color: white;
        }

        .actions {
            margin-top: 1.8rem;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .btn {
            padding: 0.7rem 1.4rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-secondary {
            background: var(--bg-body);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-hover); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 12px;
        }

        .modal-overlay.show {
            opacity: 1; pointer-events: auto;
        }

        .modal-card {
            background: white;
            border-radius: var(--radius);
            width: 100%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 1.2rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .modal-header h2 {
            color: var(--primary);
            font-size: 1.3rem;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
        }

        .score-summary {
            display: flex;
            justify-content: space-around;
            background: var(--bg-body);
            padding: 1.2rem 0.8rem;
            border-radius: 8px;
            text-align: center;
        }

        .score-num {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .modal-footer {
            padding: 1.2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
        }

        .warning-banner {
            background-color: var(--warning-light);
            border-top: 6px solid var(--warning);
            max-width: 450px !important;
        }
        .btn-warning-action {
            background: var(--warning);
            color: var(--warning-text);
        }
        .btn-warning-action:hover {
            background: #d9a006;
        }
    </style>
</head>
<body>

    <header>
        <h1>HỆ THỐNG LUYỆN THI CÔNG NGHỆ PHẦN MỀM</h1>
        <a href="index.html" class="header-nav-link">← Phần 1</a>
    </header>

    <div class="container">
        <div class="main-content">
            <div id="quiz-area">
                </div>
        </div>

        <div class="sidebar">
            <div class="progress-container">
                <div style="display: flex; justify-content: space-between; font-weight: 600; font-size: 0.9rem;">
                    <span>Tiến độ luyện đề:</span>
                    <span id="progress-text">0/39</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>
            <div class="grid-nav" id="question-grid">
                </div>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 15px;" onclick="resetQuiz()">Làm lại từ đầu</button>
        </div>
    </div>

    <div class="modal-overlay" id="warning-modal">
        <div class="modal-card warning-banner">
            <div class="modal-body" style="text-align: center; padding: 1.5rem 1rem;">
                <div style="font-size: 2.5rem; margin-bottom: 8px;">⚠️</div>
                <h3 style="font-size: 1.2rem; margin-bottom: 10px; color: var(--warning-text); font-weight: 700;">Chưa chọn đáp án!</h3>
                <p style="color: #6b7280; margin-bottom: 20px; font-size: 0.9rem;">Bạn chưa chọn câu trả lời này. Bạn muốn ở lại chọn đáp án hay bỏ qua để đi tiếp?</p>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button class="btn btn-secondary" onclick="closeWarningModal()">Ở lại</button>
                    <button class="btn btn-warning-action" onclick="confirmSkipQuestion()">Chuyển tiếp</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>BẢNG ĐÁNH GIÁ KẾT QUẢ</h2>
            </div>
            <div class="modal-body">
                <div class="score-summary">
                    <div>
                        <div class="score-num" style="color: var(--success);" id="modal-correct-count">0</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Đúng</div>
                    </div>
                    <div>
                        <div class="score-num" style="color: var(--danger);" id="modal-wrong-count">0</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Sai</div>
                    </div>
                    <div>
                        <div class="score-num" style="color: var(--warning-text);" id="modal-skip-count">0</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Bỏ qua</div>
                    </div>
                    <div>
                        <div class="score-num" style="color: var(--primary);" id="modal-ratio">0%</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Tỷ lệ đúng</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="resetQuiz(); closeResultModal();">Xáo trộn đề & Làm lại</button>
            </div>
        </div>
    </div>

    <script>
        const rawQuizData = [
            { q: "Câu 2: Kiểm thử được thực hiện đến khi nào?", a: ["Hết thời gian.", "Độ tin cậy cần thiết đạt được / Mức rủi ro chấp nhận được.", "Không tìm thấy lỗi nào nữa.", "Người dùng sẽ không tìm thấy bất kỳ lỗi nghiêm trọng nào."], c: 1 },
            { q: "Câu 3: Điều nào sau đây mô tả lợi ích chính của việc xác minh (verification) sớm trong vòng đời?", a: ["Nó cho phép xác định các thay đổi trong yêu cầu của người dùng.", "Nó tạo điều kiện cho việc thiết lập môi trường kiểm thử kịp thời.", "Nó làm giảm sự gia tăng của lỗi.", "Nó cho phép người kiểm thử sớm tham gia vào dự án."], c: 2 },
            { q: "Câu 4: Kiểm thử Alpha là:", a: ["Kiểm thử sau khi phát hành được thực hiện bởi người dùng cuối.", "Kiểm thử đầu tiên được thực hiện.", "Kiểm thử trước khi phát hành được thực hiện bởi nhóm đại diện người dùng.", "Kiểm thử cuối cùng trước khi phát hành."], c: 2 },
            { q: "Câu 5: Trong một hệ thống được thiết kế để tính thuế phải trả: Một nhân viên có £4000 tiền lương miễn thuế. £1500 tiếp theo bị đánh thuế 10%. £28000 tiếp theo đánh thuế 12%. Bất kỳ số tiền còn lại sẽ bị đánh thuế ở mức 40%. Nhóm nào trong số các nhóm sau sẽ rơi vào cùng một lớp tương đương?", a: ["£4800; £14000; £28000", "£5200; £5500; £28000", "£28001; £32000; £35000", "£5800; £28000; £32000"], c: 3 },
            { q: "Câu 6: Điều quan trọng nhất về thiết kế kiểm thử sớm là:", a: ["Làm cho việc chuẩn bị kiểm thử dễ dàng hơn.", "Giúp việc kiểm thử nhanh hơn.", "Có thể ngăn chặn sự nhân lên của lỗi.", "Giúp tìm ra tất cả các lỗi."], c: 2 },
            { q: "Câu 7: Phát biểu nào sau đây là phát biểu đúng về review?", a: ["Review không thể thực hiện dựa trên thông số kỹ thuật yêu cầu của người dùng.", "Review là cách kiểm tra mã kém hiệu quả nhất.", "Review không có khả năng tìm ra lỗi trong kế hoạch kiểm thử.", "Review được thực hiện dựa theo thông số kỹ thuật, code và kế hoạch kiểm thử."], c: 3 },
            { q: "Câu 8: Các test case được thiết kế khi nào?", a: ["Khi thực thi kiểm thử.", "Khi lập kế hoạch kiểm thử.", "Khi cấu hình môi trường kiểm thử.", "Khi phân tích và thiết kế kiểm thử."], c: 3 },
            { q: "Câu 9: Nếu kết quả mong đợi (trong test case) không được xác định thì:", a: ["Chúng ta không thể chạy kiểm thử.", "Có thể khó lập lại bài kiểm thử.", "Có thể khó xác định xem bài kiểm thử là đạt hay không đạt.", "Chúng ta không thể nhập tự động đầu vào của người dùng."], c: 2 },
            { q: "Câu 10: Xác minh (verification) là:", a: ["Kiểm thử xem chúng ta có đang xây dựng hệ thống có phù hợp không.", "Kiểm thử xem chúng ta có đang xây dựng hệ thống đúng cách không.", "Được thực hiện bởi một nhóm kiểm thử độc lập.", "Đảm bảo rằng đó là những gì người dùng thực sự muốn."], c: 1 },
            { q: "Câu 11: Khi kiểm thử hệ thống tính điểm, tester xác định rằng tất cả các điểm từ 90 đến 100 sẽ mang lại kết quả A, nhưng điểm dưới 90 sẽ không được điểm A. Phương pháp phân tích này được gọi là:", a: ["Phân vùng tương đương.", "Phân tích giá trị ranh giới.", "Bảng quyết định.", "Phân tích lai."], c: 1 },
            { q: "Câu 12: Phát biểu nào sau đây đúng với kiểm thử Beta?", a: ["Được thực hiện bởi coder.", "Được thực hiện bởi các chuyên gia.", "Được thực hiện bởi người dùng cuối.", "Được thực hiện bởi tester."], c: 2 },
            { q: "Câu 13: Phát biểu nào sau đây về tiêu chuẩn component testing là sai:", a: ["Các kỹ thuật kiểm thử hộp đen đều có một kỹ thuật đo lường liên quan.", "Các kỹ thuật kiểm thử hộp trắng đều có một kỹ thuật đo lường liên quan.", "Độ phức tạp chu trình không phải là một kỹ thuật đo kiểm thử.", "Các kỹ thuật đo lường kiểm thử hộp trắng đều có một kỹ thuật thiết kế kiểm thử liên quan."], c: 0 },
            { q: "Câu 14: Phát biểu nào sau đây đúng về kết quả mong đợi?", a: ["Chỉ quan trọng trong kiểm thử hệ thống.", "Chỉ được sử dụng trong kiểm thử đơn vị.", "Không bao giờ được xác định trước.", "Hữu ích nhất khi được xác định trước."], c: 3 },
            { q: "Câu 15: Cho đoạn mã chương trình sau:\nIF X < Y THEN Statement 1;\nELSE IF Y >= Z THEN Statement 2;\nEND\nĐộ phức tạp chu trình là bao nhiêu?", a: ["2", "3", "4", "5"], c: 1 },
            { q: "Câu 16: Chúng ta có thể tìm thấy điều kiện dừng kiểm thử trong tài liệu nào?", a: ["Báo cáo kết quả kiểm thử.", "Test suite.", "Test case.", "Test plan."], c: 3 },
            { q: "Câu 17: Sau giai đoạn nào, chúng ta có thể tiến hành kiểm thử hộp trắng?", a: ["Sau giai đoạn code.", "Sau giai đoạn thiết kế.", "Sau khi tạo SRS.", "Sau giai đoạn cài đặt."], c: 0 },
            { q: "Câu 18: Lý do chính để kiểm thử phần mềm trước khi phát hành là gì?", a: ["Để cho thấy rằng hệ thống sẽ hoạt động sau khi phát hành.", "Để quyết định khi nào phần mềm có đủ chất lượng để phát hành.", "Để tìm càng nhiều lỗi càng tốt trước khi phát hành.", "Để cung cấp thông tin cho một quyết định dựa trên rủi ro về việc phát hành."], c: 3 },
            { q: "Câu 19: Phát biểu nào sau đây đúng về độ bao phủ?", a: ["Không liên quan gì đến thử nghiệm.", "Là một thước đo về tính kỹ lưỡng của thử nghiệm.", "Độ phủ nhánh phải là bắt buộc đối với tất cả phần mềm.", "Chỉ có thể được áp dụng trong kiểm thử đơn vị hoặc mô-đun, không áp dụng trong kiểm thử hệ thống."], c: 1 },
            { q: "Câu 20: Lỗi nào trong các lỗi sau tốn chi phí khắc phục nhất?", a: ["Lỗi trong đặc tả chương trình.", "Lỗi trong code.", "Lỗi trong yêu cầu.", "Lỗi trong thiết kế."], c: 2 },
            { q: "Câu 21: Mục tiêu chính khi review một giao phẩm phần mềm là gì?", a: ["Để xác định các lỗi tiềm ẩn bằng cách sử dụng đặc tả kiểm thử.", "Để xác định các khiếm khuyết trong bất kỳ sản phẩm công việc phần mềm nào.", "Để xác định các lỗi chính tả trong một đặc tả yêu cầu.", "Để xác định code viết không theo chuẩn."], c: 1 },
            { q: "Câu 22: Việc xác định tiêu chí dừng kiểm thử được thực hiện khi nào?", a: ["Trong khi lập kế hoạch kiểm thử.", "Khi đánh giá các tiêu chí dừng và lập báo cáo.", "Khi trong quá trình kiểm thử.", "Khi kiểm soát quá trình kiểm thử."], c: 0 },

            { q: "Câu 31: Phát biểu nào sau đây phù hợp nhất với code review?", a: ["Chạy các test case để phát hiện các vấn đề của code.", "Chạy chương trình bằng tay để tìm lỗi.", "Dựa vào sơ đồ dòng điều khiển để tìm lỗi.", "So sánh với tài liệu thiết kế để xác định code chưa đạt."], c: 3 },
            { q: "Câu 32: Các bước cơ bản của quá trình kiểm thử dòng điều khiển là:", a: ["Tính độ phức tạp chu trình để xác định loại đồ thị dòng điều khiển, xác định đường thi hành, sinh test case dựa vào đường thi hành.", "Sinh đồ thị các test case từ code với độ đo cần kiểm thử, thực hiện các test case.", "Sinh đồ thị dòng điều khiển CFG với tiêu chí độ đo cần kiểm thử, sinh các test case, thực hiện.", "Sinh đồ thị dòng điều khiển CFG với tiêu chí độ đo cần kiểm thử, sinh các đường thi hành, sinh test case, thực hiện các test case."], c: 3 },
            { q: "Câu 33: Định nghĩa nào là phù hợp cho test case?", a: ["Là một cơ chế xác minh tính chính xác của kết quả đầu ra.", "Là một cơ sở nguyên tắc về đo lường và thống kê.", "Là một tập giá trị đầu vào và đầu ra mong đợi.", "Là một trạng thái của hệ thống."], c: 2 },
            { q: "Câu 34: Phát biểu nào đúng về mối quan hệ giữa bao phủ dòng lệnh và bao phủ quyết định?", a: ["Bao phủ quyết định đạt 100% sẽ đảm bảo bao phủ lệnh 100%.", "Bao phủ lệnh đạt 100% sẽ đảm bảo bao phủ quyết định 100%.", "Bao phủ lệnh đạt 50% sẽ đảm bảo bao phủ quyết định 100%.", "Bao phủ quyết định đạt 50% sẽ đảm bảo bao phủ lệnh 100%."], c: 0 },
            { q: "Câu 35: Công ty X muốn xây dựng hàm tính thưởng của một nhân viên dựa vào số năm làm việc với các mức sau:\n• Ít hơn 2 năm: 1 triệu\n• Từ 2 năm và ít hơn 5 năm: 2 triệu\n• Từ 5 năm và ít hơn 10 năm: 3 triệu\n• Trên 10 năm: 4 triệu\nĐể kiểm thử hàm tính thưởng của công ty X theo phương pháp phân hoạch tương đương, cần tối thiểu bao nhiêu test case?", a: ["2", "3", "4", "5"], c: 2 },
            { q: "Câu 36: Thông tin nào thông thường KHÔNG CÓ TRONG BÁO CÁO KẾT QUẢ KIỂM THỬ (mà nằm trong Kế hoạch kiểm thử)?", a: ["Mục tiêu kiểm thử và tiêu chí để đánh giá.", "Các vấn đề xảy ra trong quá trình kiểm thử.", "So sánh tiến trình thực tế với các tiêu chí đã đặt ra.", "Đánh giá chất lượng của đối tượng được kiểm thử."], c: 0 },
            { q: "Câu 37: Kiểm thử chức năng được thực hiện khi nào?", a: ["Chỉ được thực hiện ở mức kiểm thử hệ thống và kiểm thử chấp nhận.", "Chỉ được thực hiện ở mức kiểm thử đơn vị.", "Chỉ được thực hiện ở mức kiểm thử chấp nhận.", "Được thực hiện ở tất cả các mức kiểm thử."], c: 3 },
            { q: "Câu 38: Đâu không phải là mục tiêu của kiểm thử?", a: ["Tìm lỗi.", "Tăng sự tự tin về chất lượng của chương trình.", "Ngăn chặn lỗi.", "Tìm nguyên nhân lỗi."], c: 3 },
            { q: "Câu 39: Kiểm thử tĩnh được thực hiện trong giai đoạn nào?", a: ["Đặc tả yêu cầu.", "Thiết kế.", "Lập trình.", "Tất cả các giai đoạn trên."], c: 3 },
            { q: "Câu 40: \"Ảo tưởng về sự vắng mặt của lỗi\" (absence-of-errors fallacy) có nghĩa là gì?", a: ["Nếu phần mềm không có lỗi thì nó chắc chắn thành công.", "Việc không tìm thấy lỗi có nghĩa là phần mềm đã sẵn sàng để phát hành.", "Việc sửa nhiều lỗi không đảm bảo hệ thống sẽ đáp ứng được nhu cầu của người dùng.", "Sẽ không có lỗi nếu thiết kế tốt."], c: 2 },
        ];

        let processedQuiz = [];
        let currentIndex = 0;
        let pendingTargetIndex = null;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function prepareQuizData() {
            processedQuiz = rawQuizData.map((item, originIdx) => {
                let formattedOptions = item.a.map((optionText, optIdx) => {
                    return { text: optionText, isCorrect: optIdx === item.c };
                });
                shuffleArray(formattedOptions);

                return {
                    originalId: originIdx + 1,
                    questionText: item.q,
                    options: formattedOptions,
                    userSelectedIndex: null,
                    isUserCorrect: null,
                    isSkipped: false
                };
            });
            shuffleArray(processedQuiz);
        }

        function initQuiz() {
            prepareQuizData();
            currentIndex = 0;
            renderGrid();
            renderQuestion();
        }

        function renderGrid() {
            const grid = document.getElementById('question-grid');
            grid.innerHTML = '';
            processedQuiz.forEach((_, idx) => {
                const item = document.createElement('div');
                item.classList.add('grid-item');
                item.id = `grid-item-${idx}`;
                item.innerText = idx + 1;
                item.onclick = () => {
                    tryNavigation(idx);
                };
                grid.appendChild(item);
            });
            updateSidebarStatus();
        }

        function tryNavigation(targetIdx) {
            if (targetIdx < 0 || targetIdx >= processedQuiz.length) return;

            if (targetIdx > currentIndex && processedQuiz[currentIndex].userSelectedIndex === null) {
                pendingTargetIndex = targetIdx;
                openWarningModal();
            } else {
                currentIndex = targetIdx;
                renderQuestion();
            }
        }

        function openWarningModal() {
            document.getElementById('warning-modal').classList.add('show');
        }

        function closeWarningModal() {
            document.getElementById('warning-modal').classList.remove('show');
            pendingTargetIndex = null;
        }

        function confirmSkipQuestion() {
            processedQuiz[currentIndex].isSkipped = true; 
            currentIndex = pendingTargetIndex;
            closeWarningModal();
            renderQuestion();
        }

        function updateSidebarStatus() {
            let answeredCount = 0;
            let skippedCount = 0;

            processedQuiz.forEach((q, idx) => {
                const item = document.getElementById(`grid-item-${idx}`);
                if(!item) return;

                item.classList.remove('active', 'correct', 'wrong', 'skipped');

                if (idx === currentIndex) item.classList.add('active');

                if (q.userSelectedIndex !== null) {
                    answeredCount++;
                    if(q.isUserCorrect) item.classList.add('correct'); 
                    else item.classList.add('wrong');
                } else if (q.isSkipped) {
                    skippedCount++;
                    item.classList.add('skipped');
                }
            });

            const totalProcessed = answeredCount + skippedCount;
            document.getElementById('progress-text').innerText = `${totalProcessed}/${processedQuiz.length}`;
            const percentage = (totalProcessed / processedQuiz.length) * 100;
            document.getElementById('progress-fill').style.width = `${percentage}%`;

            if (totalProcessed === processedQuiz.length) {
                setTimeout(showResultSummary, 600);
            }
        }

        function renderQuestion() {
            const area = document.getElementById('quiz-area');
            const currentQ = processedQuiz[currentIndex];
            
            let optionsHTML = '';
            currentQ.options.forEach((opt, i) => {
                let stateClass = '';
                
                if(currentQ.userSelectedIndex !== null) {
                    stateClass = 'disabled ';
                    if(opt.isCorrect) {
                        stateClass += 'correct-instant';
                    } else if(currentQ.userSelectedIndex === i) {
                        stateClass += 'wrong-instant';
                    }
                }

                optionsHTML += `
                    <div class="option-item ${stateClass}" onclick="handleOptionClick(${i})">
                        <div class="option-prefix">${String.fromCharCode(65 + i)}</div>
                        <div style="flex: 1; white-space: pre-line;">${opt.text}</div>
                    </div>
                `;
            });

            area.innerHTML = `
                <div class="q-header">${currentQ.questionText}</div>
                <div class="options-list">${optionsHTML}</div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="tryNavigation(currentIndex - 1)" ${currentIndex === 0 ? 'disabled' : ''}>Câu trước</button>
                    <button class="btn btn-primary" onclick="tryNavigation(currentIndex + 1)" ${currentIndex === processedQuiz.length - 1 ? 'disabled' : ''}>Câu tiếp theo</button>
                </div>
            `;
            
            updateSidebarStatus();
            
            if (window.innerWidth <= 900) {
                document.getElementById('quiz-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function handleOptionClick(optionIdx) {
            const currentQ = processedQuiz[currentIndex];
            if(currentQ.userSelectedIndex !== null) return;

            currentQ.userSelectedIndex = optionIdx;
            currentQ.isUserCorrect = currentQ.options[optionIdx].isCorrect;
            currentQ.isSkipped = false;

            renderQuestion();
        }

        function showResultSummary() {
            let correct = 0;
            let wrong = 0;
            let skipped = 0;

            processedQuiz.forEach((q) => {
                if (q.userSelectedIndex !== null) {
                    if (q.isUserCorrect) correct++;
                    else wrong++;
                } else {
                    skipped++;
                }
            });

            document.getElementById('modal-correct-count').innerText = correct;
            document.getElementById('modal-wrong-count').innerText = wrong;
            document.getElementById('modal-skip-count').innerText = skipped;
            document.getElementById('modal-ratio').innerText = Math.round((correct / processedQuiz.length) * 100) + '%';

            document.getElementById('result-modal').classList.add('show');
        }

        function closeResultModal() {
            document.getElementById('result-modal').classList.remove('show');
        }

        function resetQuiz() {
            if(confirm("Bạn có chắc chắn muốn làm lại? Đề thi và thứ tự các đáp án sẽ được xáo trộn ngẫu nhiên một lần nữa.")) {
                initQuiz();
            }
        }

        window.onload = initQuiz;
    </script>
